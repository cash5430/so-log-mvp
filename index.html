<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Scroll Test</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }

html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
}

/* 頁面容器 */
.page {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  display: flex;
  flex-direction: column;
  background: #000;
}

/* 頂部固定 */
.header {
  flex-shrink: 0;
  height: 60px;
  background: #111;
  display: flex;
  align-items: center;
  padding: 0 16px;
  color: #BF40BF;
  font-size: 16px;
  font-weight: bold;
}

/* 滑動區 */
.body {
  flex: 1;
  overflow-y: scroll;
  -webkit-overflow-scrolling: touch;
  background: #000;
}

/* 底部固定 */
.footer {
  flex-shrink: 0;
  height: 60px;
  background: #111;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #BF40BF;
  font-size: 12px;
}

/* 內容 */
.item {
  padding: 20px 16px;
  border-bottom: 0.5px solid #222;
  color: white;
  font-size: 14px;
}
.item:nth-child(odd) { background: #0a0a0a; }
</style>
</head>
<body>
<div class="page">
  <div class="header">✦ Scroll Test — 可以上下滑動嗎？</div>
  <div class="body" id="scroll-body">
    <!-- 30 個測試項目 -->
  </div>
  <div class="footer">底部固定區域 · 上方可以滑動</div>
</div>
<script>
var body = document.getElementById('scroll-body');
for (var i = 1; i <= 30; i++) {
  var div = document.createElement('div');
  div.className = 'item';
  div.textContent = '第 ' + i + ' 行 — 如果你能看到這裡，代表可以滑動 ✓';
  if (i === 1) div.style.color = '#BF40BF';
  if (i === 30) { div.style.color = '#22c55e'; div.textContent = '🎉 第30行！滑動成功！'; }
  body.appendChild(div);
}

// 確認初始化
body.style.overflowY = 'scroll';
body.style.webkitOverflowScrolling = 'touch';

document.querySelector('.header').textContent = '✦ 共30行，試著往下滑';
</script>
</body>
</html>
